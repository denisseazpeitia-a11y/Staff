<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Logística Ultra Pro</title>
  <style>
    :root{
      --bg:#f6f1e8;
      --panel:#ffffff;
      --ink:#241b16;
      --muted:#7a6d60;
      --line:#e8ddd1;
      --accent:#d94a2f;
      --blue:#1f5da9;
      --green:#1f8c4b;
      --gold:#c27a10;
      --purple:#7d4bc7;
      --soft:#faf7f2;
      --shadow:0 10px 30px rgba(36,27,22,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--ink)}
    .topbar{background:#1f1712;color:#fff;padding:20px;border-top:4px solid var(--accent)}
    .topbar h1{margin:0 0 6px;font-size:34px}
    .topbar p{margin:0;color:#d5c7bc;font-size:14px}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .toolbar,.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
    .btn,.field{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
    .btn{padding:11px 14px;font-weight:bold;cursor:pointer;text-decoration:none;color:var(--ink)}
    .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-secondary{background:#efe7dd}
    .field{padding:10px 12px;min-width:150px}
    .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:bold;margin-bottom:6px}
    .field input,.field select{border:none;outline:none;background:transparent;width:100%;font-size:14px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow)}
    .stat .num{font-size:28px;font-weight:bold}
    .stat .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .cards{display:grid;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px;border-left:6px solid var(--accent)}
    .card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .event{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:bold;margin-bottom:6px}
    .time{font-size:18px;font-weight:bold;color:var(--blue)}
    .activity{font-size:18px;font-weight:bold;margin:8px 0 4px}
    .meta{font-size:13px;color:var(--muted)}
    .notes{margin-top:10px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px}
    .tags,.links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .tag{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold;border:1px solid transparent}
    .area{background:#f2ebff;color:var(--purple);border-color:#d8c7ff}
    .person{background:#fff7ea;color:#8c5d10;border-color:#eed2a3}
    .status-pendiente{background:#fff4e8;color:#9a6220;border-color:#f1d1a7}
    .status-en-proceso{background:#eaf2ff;color:#275da5;border-color:#bad0f3}
    .status-listo{background:#eaf8ef;color:#247844;border-color:#bbe2c8}
    .status-terminado{background:#edf9f2;color:#1b7e42;border-color:#b4dfc4}
    .status-default{background:#f3eee8;color:#6f6256;border-color:#e2d7ca}
    .link-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:bold;text-decoration:none;color:#fff}
    .drive{background:#2b78e4}
    .maps{background:#188038}
    .whatsapp{background:#25d366;color:#123}
    .generic{background:#d94a2f}
    .empty{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px;text-align:center;color:var(--muted)}
    .small{font-size:12px;color:var(--muted)}
    @media (max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:600px){.stats{grid-template-columns:1fr}.topbar h1{font-size:28px}}
  </style>
</head>
<body>
  <div class="topbar">
    <div style="max-width:1200px;margin:0 auto;">
      <h1>Boda Rocío & Aaron · Staff</h1>
      <p>Panel operativo compartido · actividades, horarios y links útiles del equipo</p>
    </div>
  </div>

  <div class="wrap">
    <div class="toolbar">
      <button class="btn btn-primary" id="refreshBtn">Actualizar datos</button>
      <button class="btn btn-secondary" id="todayBtn">Solo hoy</button>
      <button class="btn btn-secondary" id="clearBtn">Limpiar filtros</button>
      <a class="btn" id="sheetLink" href="#" target="_blank" rel="noopener noreferrer">Abrir Google Sheet</a>
      <span class="small" id="lastUpdated">Sin actualizar</span>
    </div>

    <div class="filters">
      <div class="field"><label>Buscar</label><input id="searchInput" placeholder="Actividad, notas, responsable..." /></div>
      <div class="field"><label>Evento</label><select id="eventFilter"><option value="">Todos</option></select></div>
      <div class="field"><label>Fecha</label><select id="dateFilter"><option value="">Todas</option></select></div>
      <div class="field"><label>Área</label><select id="areaFilter"><option value="">Todas</option></select></div>
      <div class="field"><label>Responsable</label><select id="personFilter"><option value="">Todos</option></select></div>
      <div class="field"><label>Estado</label><select id="statusFilter"><option value="">Todos</option><option>Pendiente</option><option>En proceso</option><option>Listo</option><option>Terminado</option></select></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">Actividades</div></div>
      <div class="stat"><div class="num" id="eventCount">0</div><div class="lbl">Eventos</div></div>
      <div class="stat"><div class="num" id="personCount">0</div><div class="lbl">Responsables</div></div>
      <div class="stat"><div class="num" id="linkCount">0</div><div class="lbl">Links activos</div></div>
    </div>

    <div class="cards" id="cards"></div>
    <div class="empty" id="emptyState" style="display:none">No hay actividades que coincidan con los filtros.</div>
  </div>

  <script>
    const SHEET_ID = "1gV6LHww9eqazeLvqukx_dlZSWf1nMCGkIRa85mVc2Zs";
    const SHEET_NAME = "Hoja 1";
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const sheetEditUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;
    document.getElementById('sheetLink').href = sheetEditUrl;

    let rows = [];

    function parseCSV(text){
      const out=[]; let row=[]; let value=''; let inQuotes=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], next=text[i+1];
        if(c==='"'){
          if(inQuotes && next==='"'){ value+='"'; i++; }
          else inQuotes=!inQuotes;
        } else if(c===',' && !inQuotes){
          row.push(value); value='';
        } else if((c==='\n' || c==='\r') && !inQuotes){
          if(c==='\r' && next==='\n') i++;
          if(value.length || row.length){ row.push(value); out.push(row); row=[]; value=''; }
        } else value += c;
      }
      if(value.length || row.length){ row.push(value); out.push(row); }
      return out;
    }

    function normalize(s=''){ return String(s).trim().toLowerCase(); }
    function escapeHtml(s=''){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
    function uniq(arr){ return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }

    function fillSelect(id, values){
      const el=document.getElementById(id); const current=el.value; const first=el.querySelector('option').outerHTML;
      el.innerHTML = first + values.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      if(values.includes(current)) el.value=current;
    }

    function linkMeta(url=''){
      const u = normalize(url);
      if(!u) return null;
      if(u.includes('drive.google')) return {cls:'drive', label:'📁 Ver Drive'};
      if(u.includes('maps.google') || u.includes('goo.gl/maps')) return {cls:'maps', label:'📍 Ver ubicación'};
      if(u.includes('wa.me') || u.includes('whatsapp')) return {cls:'whatsapp', label:'💬 WhatsApp'};
      return {cls:'generic', label:'🔗 Ver info'};
    }

    function statusClass(status=''){
      const s = normalize(status);
      if(s==='pendiente') return 'status-pendiente';
      if(s==='en proceso' || s==='en-progreso') return 'status-en-proceso';
      if(s==='listo') return 'status-listo';
      if(s==='terminado' || s==='completado') return 'status-terminado';
      return 'status-default';
    }

    function todayString(){
      const d = new Date();
      return d.toLocaleDateString('es-MX');
    }

    function filteredRows(){
      const q = normalize(document.getElementById('searchInput').value);
      const event = normalize(document.getElementById('eventFilter').value);
      const date = normalize(document.getElementById('dateFilter').value);
      const area = normalize(document.getElementById('areaFilter').value);
      const person = normalize(document.getElementById('personFilter').value);
      const status = normalize(document.getElementById('statusFilter').value);
      return rows.filter(r=>{
        const hay = Object.values(r).join(' ').toLowerCase();
        return (!q || hay.includes(q)) &&
               (!event || normalize(r['Evento'])===event) &&
               (!date || normalize(r['Fecha'])===date) &&
               (!area || normalize(r['Área'])===area) &&
               (!person || normalize(r['Responsable'])===person) &&
               (!status || normalize(r['Estado'])===status);
      });
    }

    function render(){
      const list = filteredRows();
      document.getElementById('totalCount').textContent = list.length;
      document.getElementById('eventCount').textContent = uniq(list.map(r=>r['Evento'])).length;
      document.getElementById('personCount').textContent = uniq(list.map(r=>r['Responsable'])).length;
      document.getElementById('linkCount').textContent = list.filter(r=>r['Link']).length;

      const cards = document.getElementById('cards');
      const empty = document.getElementById('emptyState');
      if(!list.length){ cards.innerHTML=''; empty.style.display='block'; return; }
      empty.style.display='none';

      cards.innerHTML = list.map(r=>{
        const link = r['Link'] || '';
        const meta = linkMeta(link);
        const start = r['Hora inicio'] || r['Hora Inicio'] || '';
        const end = r['Hora fin'] || r['Hora Fin'] || '';
        const range = (start || end) ? `${start || ''}${start&&end?' – ':''}${end || ''}` : 'Sin horario';
        return `
          <div class="card">
            <div class="card-head">
              <div>
                <div class="event">${escapeHtml(r['Evento'] || 'Sin evento')} · ${escapeHtml(r['Fecha'] || 'Sin fecha')}</div>
                <div class="time">${escapeHtml(range)}</div>
                <div class="activity">${escapeHtml(r['Actividad'] || '—')}</div>
                <div class="meta">${escapeHtml(r['Responsable'] || 'Sin responsable')} · ${escapeHtml(r['Área'] || 'Sin área')}</div>
              </div>
              <span class="tag ${statusClass(r['Estado'])}">${escapeHtml(r['Estado'] || '—')}</span>
            </div>
            <div class="notes">${escapeHtml(r['Notas'] || 'Sin notas')}</div>
            <div class="tags">
              <span class="tag area">${escapeHtml(r['Área'] || 'Sin área')}</span>
              <span class="tag person">${escapeHtml(r['Responsable'] || 'Sin responsable')}</span>
            </div>
            ${meta ? `<div class="links"><a class="link-btn ${meta.cls}" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${meta.label}</a></div>` : ''}
          </div>
        `;
      }).join('');
    }

    async function refreshData(){
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true; btn.textContent = 'Actualizando...';
      try{
        const res = await fetch(csvUrl, {cache:'no-store'});
        const text = await res.text();
        const raw = parseCSV(text).filter(r=>r.some(c=>String(c).trim()));
        const headers = raw[0].map(h=>h.trim());
        rows = raw.slice(1).map(r=>Object.fromEntries(headers.map((h,i)=>[h,(r[i]||'').trim()])));
        fillSelect('eventFilter', uniq(rows.map(r=>r['Evento'])));
        fillSelect('dateFilter', uniq(rows.map(r=>r['Fecha'])));
        fillSelect('areaFilter', uniq(rows.map(r=>r['Área'])));
        fillSelect('personFilter', uniq(rows.map(r=>r['Responsable'])));
        render();
        document.getElementById('lastUpdated').textContent = 'Actualizado: ' + new Date().toLocaleString('es-MX');
      } catch(e){
        alert('No se pudo leer la hoja. Revisa que esté compartida y que la pestaña principal se llame "Hoja 1".');
      } finally { btn.disabled=false; btn.textContent='Actualizar datos'; }
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshData);
    document.getElementById('todayBtn').addEventListener('click', ()=>{
      const d = todayString();
      const select = document.getElementById('dateFilter');
      const opts = [...select.options].map(o=>o.value);
      if(opts.includes(d)) select.value = d;
      render();
    });
    document.getElementById('clearBtn').addEventListener('click', ()=>{
      ['searchInput','eventFilter','dateFilter','areaFilter','personFilter','statusFilter'].forEach(id=>document.getElementById(id).value='');
      render();
    });
    ['searchInput','eventFilter','dateFilter','areaFilter','personFilter','statusFilter'].forEach(id=>{
      document.getElementById(id).addEventListener(id==='searchInput'?'input':'change', render);
    });

    refreshData();
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
