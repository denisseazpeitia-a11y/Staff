<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Rocío & Aaron · Staff</title>

<style>
body{
  font-family:Arial;
  background:#f5f0e8;
  margin:0;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:end;
  margin-bottom:20px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:12px;
  font-weight:bold;
  color:#555;
}

select, button{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  background:#d94a2f;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button.secondary{
  background:#888;
}

.timeline-item{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border-left:6px solid #d94a2f;
}

.time{
  font-weight:bold;
  color:#1f5fa8;
  margin-bottom:5px;
}

.activity{
  font-size:16px;
  font-weight:bold;
}

.meta{
  font-size:13px;
  color:#666;
  margin-top:4px;
}

.notes{
  margin-top:8px;
  font-size:13px;
}

.link-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:10px;
  padding:6px 12px;
  background:#d94a2f;
  color:white;
  border-radius:20px;
  text-decoration:none;
  font-size:12px;
  font-weight:bold;
}

.link-btn:hover{
  opacity:.9;
}

.small{
  font-size:12px;
  color:#666;
  margin-bottom:15px;
}

.empty{
  background:white;
  padding:20px;
  border-radius:12px;
  color:#666;
}
</style>
</head>

<body>

<h2>Logística Staff</h2>

<div class="toolbar">
  <div class="field">
    <label>Evento</label>
    <select id="eventFilter">
      <option value="">Todos</option>
    </select>
  </div>

  <div class="field">
    <label>Fecha</label>
    <select id="dateFilter">
      <option value="">Todas</option>
    </select>
  </div>

  <button onclick="loadData()">Actualizar datos</button>
  <button class="secondary" onclick="clearFilters()">Limpiar filtros</button>
</div>

<div class="small" id="statusText">Cargando...</div>

<div id="app">Cargando...</div>

<script>
const SHEET_ID = "1gV6LHww9eqazeLvqukx_dlZSWf1nMCGkIRa85mVc2Zs";
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allRows = [];

function parseCSV(text){
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"'){
      if(inQuotes && next === '"'){
        value += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(char === ',' && !inQuotes){
      row.push(value);
      value = "";
    } else if((char === '\n' || char === '\r') && !inQuotes){
      if(char === '\r' && next === '\n') i++;
      if(value.length > 0 || row.length > 0){
        row.push(value);
        rows.push(row);
        row = [];
        value = "";
      }
    } else {
      value += char;
    }
  }

  if(value.length > 0 || row.length > 0){
    row.push(value);
    rows.push(row);
  }

  return rows;
}

function escapeHtml(s=''){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function uniqueValues(arr){
  return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b));
}

function fillSelect(id, values){
  const select = document.getElementById(id);
  const current = select.value;
  select.innerHTML = `<option value="">${id === 'eventFilter' ? 'Todos' : 'Todas'}</option>` +
    values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
  if(values.includes(current)) select.value = current;
}

function sortRows(rows){
  return [...rows].sort((a,b)=>{
    const aKey = `${a.fecha || ""} ${a.inicio || ""} ${a.evento || ""}`;
    const bKey = `${b.fecha || ""} ${b.inicio || ""} ${b.evento || ""}`;
    return aKey.localeCompare(bKey);
  });
}

function renderRows(){
  const selectedEvent = document.getElementById("eventFilter").value;
  const selectedDate = document.getElementById("dateFilter").value;

  let filtered = allRows.filter(r => {
    return (!selectedEvent || r.evento === selectedEvent) &&
           (!selectedDate || r.fecha === selectedDate);
  });

  filtered = sortRows(filtered);

  document.getElementById("statusText").textContent =
    `Mostrando ${filtered.length} actividad(es)`;

  if(filtered.length === 0){
    document.getElementById("app").innerHTML = `<div class="empty">No hay actividades para esos filtros.</div>`;
    return;
  }

  const html = filtered.map(r => {
    const range = (r.inicio || r.fin)
      ? `${escapeHtml(r.inicio || "")}${r.inicio && r.fin ? " - " : ""}${escapeHtml(r.fin || "")}`
      : "Sin horario";

    return `
      <div class="timeline-item">
        <div class="time">${range}</div>
        <div class="activity">${escapeHtml(r.actividad || "")}</div>
        <div class="meta">${escapeHtml(r.evento || "")} · ${escapeHtml(r.fecha || "")}</div>
        <div class="meta">${escapeHtml(r.responsable || "")} · ${escapeHtml(r.area || "")} · ${escapeHtml(r.estado || "")}</div>
        <div class="notes">${escapeHtml(r.notas || "")}</div>
        ${r.link ? `<a class="link-btn" href="${escapeHtml(r.link)}" target="_blank" rel="noopener noreferrer">🔗 Ver info</a>` : ""}
      </div>
    `;
  }).join("");

  document.getElementById("app").innerHTML = html;
}

function clearFilters(){
  document.getElementById("eventFilter").value = "";
  document.getElementById("dateFilter").value = "";
  renderRows();
}

function loadData(){
  document.getElementById("statusText").textContent = "Actualizando...";
  fetch(url)
    .then(r => r.text())
    .then(data => {
      const rows = parseCSV(data);
      const content = rows.slice(1).filter(r => r.some(cell => String(cell).trim() !== ""));

      allRows = content.map(r => ({
        evento: r[0] || "",
        fecha: r[1] || "",
        inicio: r[2] || "",
        fin: r[3] || "",
        actividad: r[4] || "",
        responsable: r[5] || "",
        area: r[6] || "",
        estado: r[7] || "",
        notas: r[8] || "",
        link: r[9] || ""
      }));

      fillSelect("eventFilter", uniqueValues(allRows.map(r => r.evento)));
      fillSelect("dateFilter", uniqueValues(allRows.map(r => r.fecha)));

      renderRows();
      document.getElementById("statusText").textContent =
        `Actualizado: ${new Date().toLocaleString("es-MX")}`;
    })
    .catch(() => {
      document.getElementById("statusText").textContent = "No se pudieron cargar los datos.";
      document.getElementById("app").innerHTML = `<div class="empty">Revisa que tu Google Sheet esté compartido con enlace.</div>`;
    });
}

document.getElementById("eventFilter").addEventListener("change", renderRows);
document.getElementById("dateFilter").addEventListener("change", renderRows);

loadData();
</script>

</body>
</html>
